<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Parent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'IBM Plex Sans', sans-serif; background: #fafaf9; color: #0f1411; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid #eceae5;
      background: #fff; font-size: 13px; position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo-mark {
      width: 24px; height: 24px; border-radius: 5px;
      background: #0f1411; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700;
    }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .breadcrumb .sep { color: #737773; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 6px;
      background: #fffbeb; color: #b45309;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .signout-btn {
      font-size: 11px; color: #737773; background: none; border: none;
      cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
    }
    .signout-btn:hover { color: #0f1411; }

    /* Student selector */
    .student-selector {
      background: #fff; border-bottom: 1px solid #eceae5;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    }
    .selector-label { font-size: 11px; color: #737773; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
    .student-select {
      padding: 7px 12px; border-radius: 7px; border: 1px solid #e3e0da;
      font-size: 13px; font-family: 'IBM Plex Sans', sans-serif;
      background: #fff; outline: none; cursor: pointer;
    }
    .student-select:focus { border-color: #047857; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #eceae5; background: #fff;
    }
    .stat-cell { padding: 14px 18px; border-right: 1px solid #eceae5; }
    .stat-cell:last-child { border-right: none; }
    .stat-label { font-size: 10.5px; color: #737773; letter-spacing: 0.3px; text-transform: uppercase; font-weight: 500; }
    .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .stat-sub { font-size: 11px; color: #737773; margin-top: 1px; }

    /* Main */
    .main { padding: 20px; max-width: 900px; }

    .section-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; }

    /* Progress card */
    .card {
      background: #fff; border-radius: 8px;
      border: 1px solid #eceae5; padding: 20px; margin-bottom: 20px;
    }
    .card-title { font-size: 12px; font-weight: 600; color: #737773; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 16px; }

    /* Juz progress bar */
    .juz-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .juz-label {
      width: 52px; font-size: 11px; color: #3a3f3c;
      font-family: 'IBM Plex Mono', monospace; text-align: right;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    .juz-bar-track {
      flex: 1; height: 8px; background: #f0eee9; border-radius: 4px; overflow: hidden;
    }
    .juz-bar-fill {
      height: 100%; border-radius: 4px; background: #047857;
      transition: width 0.3s ease;
    }

    /* Log list */
    .log-item {
      display: grid; grid-template-columns: 1.2fr 0.8fr 2fr;
      padding: 11px 0; border-bottom: 1px solid #eceae5;
      font-size: 13px; align-items: start;
    }
    .log-item:last-child { border-bottom: none; }
    .log-date { font-size: 11px; color: #737773; font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
    .log-pages { font-weight: 600; color: #047857; }
    .log-note { font-size: 12px; color: #3a3f3c; }

    .pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 5px;
      font-size: 11px; font-weight: 500;
    }
    .pill-success { background: #ecfdf5; color: #047857; }
    .pill-warn { background: #fffbeb; color: #b45309; }

    .empty-state {
      padding: 40px 20px; text-align: center; color: #737773; font-size: 13px;
    }
    .empty-state .big { font-size: 32px; margin-bottom: 8px; }

    .loading { padding: 40px; text-align: center; color: #737773; font-size: 13px; }

    /* Progress circle */
    .progress-summary {
      display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
    }
    .progress-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring .pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .progress-info .big-num { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .progress-info .label { font-size: 12px; color: #737773; margin-top: 2px; }

    .no-student {
      padding: 80px 20px; text-align: center; color: #737773;
    }
    .no-student .big { font-size: 40px; margin-bottom: 12px; }
    .no-student .title { font-size: 16px; font-weight: 600; color: #0f1411; margin-bottom: 6px; }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">Q</div>
      <div class="breadcrumb">
        <span style="font-weight:500">Quran Journey</span>
        <span class="sep">/</span>
        <span id="parent-name-crumb" style="color:#737773">Parent</span>
        <span class="sep">/</span>
        <span>Progress</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="parent-name-display" style="font-size:12px;color:#3a3f3c"></span>
      <div class="avatar" id="parent-avatar">P</div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- Student selector -->
  <div class="student-selector">
    <span class="selector-label">Viewing</span>
    <select class="student-select" id="student-select" onchange="selectStudent()">
      <option value="">Select a student…</option>
    </select>
    <span id="last-updated" style="font-size:11px;color:#737773;margin-left:auto"></span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-label">Pages Completed</div>
      <div class="stat-value" id="stat-pages">—</div>
      <div class="stat-sub">total</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Sessions Logged</div>
      <div class="stat-value" id="stat-sessions">—</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Juz Target</div>
      <div class="stat-value" id="stat-target">—</div>
      <div class="stat-sub">juz goal</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Last Session</div>
      <div class="stat-value" id="stat-last" style="font-size:16px;margin-top:5px">—</div>
      <div class="stat-sub" id="stat-last-sub">—</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="no-student" class="no-student">
      <div class="big">📖</div>
      <div class="title">Select a student above</div>
      <div>Choose your child's name to view their Quran progress.</div>
    </div>

    <div id="student-content" style="display:none">

      <!-- Recent logs -->
      <div class="card">
        <div class="card-title">Recent Progress Sessions</div>
        <div id="logs-list">
          <div class="loading">Loading…</div>
        </div>
      </div>

      <!-- All logs -->
      <div class="card">
        <div class="card-title">Full History</div>
        <div id="full-logs-list">
          <div class="loading">Loading…</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let students = [];
    let selectedStudentId = null;

    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'index.html'; return; }

      const { data: userData } = await supabase
        .from('users').select('*').eq('email', session.user.email).single();

      if (!userData || userData.role !== 'parent') {
        window.location.href = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'index.html'; return;
      }

      currentUser = userData;
      const initials = userData.name.split(' ').map(p => p[0]).join('').slice(0, 2);
      document.getElementById('parent-avatar').textContent = initials;
      document.getElementById('parent-name-display').textContent = userData.name;
      document.getElementById('parent-name-crumb').textContent = userData.name;

      await loadStudents();
    }

    async function loadStudents() {
      const { data } = await db.from('students').select('*').order('name');
      students = data || [];

      const sel = document.getElementById('student-select');
      sel.innerHTML = '<option value="">Select a student…</option>' +
        students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }

    async function selectStudent() {
      const id = parseInt(document.getElementById('student-select').value);
      if (!id) {
        document.getElementById('no-student').style.display = 'block';
        document.getElementById('student-content').style.display = 'none';
        resetStats();
        return;
      }

      selectedStudentId = id;
      const student = students.find(s => s.id === id);

      document.getElementById('no-student').style.display = 'none';
      document.getElementById('student-content').style.display = 'block';

      // Load logs for this student
      const { data: logs } = await supabase
        .from('progress_logs')
        .select('*')
        .eq('student_id', id)
        .order('date', { ascending: false });

      const allLogs = logs || [];

      // Update stats
      const totalPages = allLogs.reduce((sum, l) => sum + (l.pages_completed || 0), 0);
      document.getElementById('stat-pages').textContent = totalPages;
      document.getElementById('stat-sessions').textContent = allLogs.length;
      document.getElementById('stat-target').textContent = student.juz_target ? `1–${student.juz_target}` : '—';

      if (allLogs.length > 0) {
        const last = allLogs[0];
        const lastDate = new Date(last.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('stat-last').textContent = lastDate;
        document.getElementById('stat-last-sub').textContent = `${last.pages_completed} pages`;
        document.getElementById('last-updated').textContent = `Last updated ${lastDate}`;
      } else {
        document.getElementById('stat-last').textContent = '—';
        document.getElementById('stat-last-sub').textContent = 'no logs yet';
        document.getElementById('last-updated').textContent = '';
      }

      renderLogs('logs-list', allLogs.slice(0, 5), student);
      renderLogs('full-logs-list', allLogs, student);
    }

    function renderLogs(elId, logs, student) {
      const el = document.getElementById(elId);
      if (logs.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="big">📝</div>No progress logged yet. Check back after the next session.</div>`;
        return;
      }

      el.innerHTML = `
        <div style="display:grid;grid-template-columns:1.2fr 0.8fr 2fr;padding:0 0 8px 0;margin-bottom:4px;border-bottom:1px solid #eceae5">
          <div style="font-size:10.5px;color:#737773;text-transform:uppercase;letter-spacing:0.3px;font-weight:500">Date</div>
          <div style="font-size:10.5px;color:#737773;text-transform:uppercase;letter-spacing:0.3px;font-weight:500">Pages</div>
          <div style="font-size:10.5px;color:#737773;text-transform:uppercase;letter-spacing:0.3px;font-weight:500">Teacher Note</div>
        </div>
        ${logs.map(l => {
          const dateStr = new Date(l.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          const note = l.teacher_note || '<span style="color:#737773;font-style:italic">No note left</span>';
          return `
            <div class="log-item">
              <div class="log-date">${dateStr}</div>
              <div><span class="pill pill-success">${l.pages_completed}p</span></div>
              <div class="log-note">${note}</div>
            </div>
          `;
        }).join('')}
      `;
    }

    function resetStats() {
      ['stat-pages','stat-sessions','stat-target','stat-last'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('stat-last-sub').textContent = '—';
      document.getElementById('last-updated').textContent = '';
    }

    async function signOut() {
      await db.auth.signOut();
      window.location.href = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'index.html';
    }

    init();
  </script>
</body>
</html>
