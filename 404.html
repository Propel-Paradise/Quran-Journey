<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Quran Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:#0b0f0d;color:#e7e5e0;}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
    .logo-mark{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#10b981,#047857);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;margin:0 auto 20px;}
    .code{font-family:'IBM Plex Mono',monospace;font-size:72px;font-weight:700;color:#10b981;letter-spacing:-2px;line-height:1;margin-bottom:16px;}
    h1{font-size:22px;font-weight:600;color:#fff;margin-bottom:8px;letter-spacing:-0.3px;}
    p{font-size:13px;color:#6b716d;line-height:1.6;max-width:320px;margin-bottom:28px;}
    .btn{display:inline-block;padding:10px 24px;border-radius:7px;background:#10b981;color:#062e22;font-size:13px;font-weight:600;text-decoration:none;transition:opacity 0.15s;}
    .btn:hover{opacity:0.9;}
    .btn-ghost{display:inline-block;padding:10px 24px;border-radius:7px;border:1px solid #1c2e26;color:#9aa19d;font-size:13px;font-weight:500;text-decoration:none;margin-left:10px;transition:all 0.15s;}
    .btn-ghost:hover{border-color:#10b981;color:#10b981;}
  </style>
</head>
<body>
  <div class="logo-mark">Q</div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <div>
    <a href="index.html" class="btn">Go to Sign In</a>
    <a href="javascript:history.back()" class="btn-ghost">Go Back</a>
  </div>
</body>
</html>
