<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Set Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'IBM Plex Sans', sans-serif; background: #fafaf9; color: #0f1411; }

    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background-image: radial-gradient(circle at 20% 50%, #ecfdf5 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, #f0fdf4 0%, transparent 40%);
    }

    .card {
      width: 100%; max-width: 380px;
      background: #fff; border: 1px solid #eceae5;
      border-radius: 12px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 7px;
      background: #0f1411; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700;
    }
    .logo-name { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }

    .welcome-icon { font-size: 36px; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #737773; margin-bottom: 24px; line-height: 1.5; }

    .info-box {
      background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8;
      border-radius: 7px; padding: 10px 12px; font-size: 12px; margin-bottom: 20px;
      line-height: 1.5;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 10.5px; color: #737773;
      letter-spacing: 0.4px; text-transform: uppercase; font-weight: 500; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 9px 12px; border-radius: 7px;
      border: 1px solid #e3e0da; background: #fff;
      font-size: 13px; font-family: 'IBM Plex Sans', sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: #047857; }

    .strength-bar { height: 3px; border-radius: 2px; background: #f0eee9; margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background 0.2s; width: 0%; }
    .strength-label { font-size: 10.5px; color: #737773; margin-top: 3px; }

    .btn-primary {
      width: 100%; padding: 10px; border-radius: 7px; border: none;
      background: #0f1411; color: #fff; font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 7px; padding: 9px 12px; font-size: 12px; margin-bottom: 14px;
    }

    .loading-screen {
      text-align: center; padding: 20px 0; color: #737773; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">Q</div>
      <div class="logo-name">Quran Journey</div>
    </div>

    <div id="loading-screen" class="loading-screen">Verifying session…</div>

    <div id="main-content" style="display:none">
      <div class="welcome-icon">🔐</div>
      <h1>Set your password</h1>
      <p class="subtitle">You've been added by your school. Set a personal password to secure your account.</p>

      <div class="info-box">
        Your email: <strong id="user-email"></strong>
      </div>

      <div id="error" class="error" style="display:none;"></div>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Minimum 8 characters" oninput="checkStrength()" />
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="new-password2" placeholder="Re-enter password" />
      </div>

      <button class="btn-primary" id="save-btn" onclick="savePassword()">Set Password & Continue</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const redirectBase = () => window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    function checkStrength() {
      const pw = document.getElementById('new-password').value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
      const labels = ['','Weak','Fair','Good','Strong','Very strong'];
      fill.style.width = `${(score / 5) * 100}%`;
      fill.style.background = colors[score - 1] || '#f0eee9';
      label.textContent = labels[score] || '';
    }

    async function init() {
      const { data: { session } } = await db.auth.getSession();

      if (!session) {
        // No session — redirect to login
        window.location.href = redirectBase() + 'index.html';
        return;
      }

      const { data: userData } = await db.from('users').select('*').eq('email', session.user.email).single();

      // If they don't need to change password, send them to their dashboard
      if (!userData?.must_change_password) {
        window.location.href = userData?.role === 'teacher'
          ? redirectBase() + 'school.html'
          : redirectBase() + 'parent.html';
        return;
      }

      document.getElementById('user-email').textContent = session.user.email;
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    }

    async function savePassword() {
      const pw = document.getElementById('new-password').value;
      const pw2 = document.getElementById('new-password2').value;
      const btn = document.getElementById('save-btn');
      const errEl = document.getElementById('error');

      if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
      if (pw !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Saving…';
      errEl.style.display = 'none';

      const { error: pwError } = await db.auth.updateUser({ password: pw });
      if (pwError) {
        errEl.textContent = pwError.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set Password & Continue';
        return;
      }

      // Clear the must_change_password flag and remove temp password
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        await db.from('users').update({ must_change_password: false, temp_password: null }).eq('email', session.user.email);
        const { data: userData } = await db.from('users').select('role').eq('email', session.user.email).single();
        window.location.href = userData?.role === 'teacher'
          ? redirectBase() + 'school.html'
          : redirectBase() + 'parent.html';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') savePassword(); });
    init();
  </script>
</body>
</html>
