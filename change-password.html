<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Set Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:#0b0f0d;color:#e7e5e0;}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .card{width:100%;max-width:380px;background:#111814;border:1px solid #1c2e26;border-radius:12px;padding:32px;}
    .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#10b981,#047857);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;}
    .logo-name{font-size:16px;font-weight:600;color:#fff;}
    .icon{font-size:36px;margin-bottom:12px;}
    h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.4px;margin-bottom:4px;}
    .sub{font-size:13px;color:#9aa19d;margin-bottom:20px;line-height:1.5;}
    .info-box{background:#064e3b;border:1px solid #14523f;border-radius:7px;padding:10px 13px;font-size:12px;color:#d1fae5;margin-bottom:18px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;color:#9aa19d;letter-spacing:0.4px;text-transform:uppercase;font-weight:500;margin-bottom:6px;}
    .field input{width:100%;padding:10px 13px;border-radius:7px;border:1px solid #1c2e26;background:#0b0f0d;font-size:13px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color 0.15s;color:#e7e5e0;}
    .field input:focus{border-color:#10b981;}
    .strength-bar{height:3px;border-radius:2px;background:#1c2e26;margin-top:6px;overflow:hidden;}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.2s,background 0.2s;width:0%;}
    .strength-label{font-size:10.5px;color:#6b716d;margin-top:3px;}
    .btn-primary{width:100%;padding:11px;border-radius:7px;border:none;background:#10b981;color:#062e22;font-size:13px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;cursor:pointer;transition:opacity 0.15s;margin-top:4px;}
    .btn-primary:hover{opacity:0.9;}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
    .error{background:#1f1010;border:1px solid #3d1515;color:#f87171;border-radius:7px;padding:10px 13px;font-size:12px;margin-bottom:14px;}
    .loading-screen{text-align:center;color:#6b716d;font-size:13px;padding:20px 0;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row"><div class="logo-mark">Q</div><div class="logo-name">Quran Journey</div></div>
    <div id="loading-screen" class="loading-screen">Verifying session…</div>
    <div id="main-content" style="display:none">
      <div class="icon">🔐</div>
      <h1>Set your password</h1>
      <p class="sub">You've been added by your school. Set a personal password to secure your account.</p>
      <div class="info-box">Your email: <strong id="user-email"></strong></div>
      <div id="error" class="error" style="display:none"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Minimum 8 characters" oninput="checkStrength()" />
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field"><label>Confirm Password</label><input type="password" id="new-password2" placeholder="Re-enter password" /></div>
      <button class="btn-primary" id="save-btn" onclick="savePassword()">Set Password & Continue →</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY='sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const BASE='https://propel-paradise.github.io/Quran-Journey';
    function checkStrength(){const pw=document.getElementById('new-password').value;const fill=document.getElementById('strength-fill');const label=document.getElementById('strength-label');let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;const colors=['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];const labels=['','Weak','Fair','Good','Strong','Very strong'];fill.style.width=`${(s/5)*100}%`;fill.style.background=colors[s-1]||'';label.textContent=labels[s]||'';}
    async function init(){
      const{data:{session}}=await db.auth.getSession();
      if(!session){window.location.href=BASE+'/index.html';return;}
      const{data:u}=await db.from('users').select('*').eq('email',session.user.email).single();
      if(!u?.must_change_password){window.location.href=u?.role==='teacher'?BASE+'/school.html':BASE+'/parent.html';return;}
      document.getElementById('user-email').textContent=session.user.email;
      document.getElementById('loading-screen').style.display='none';document.getElementById('main-content').style.display='block';
    }
    async function savePassword(){
      const pw=document.getElementById('new-password').value,pw2=document.getElementById('new-password2').value;
      const btn=document.getElementById('save-btn'),errEl=document.getElementById('error');
      if(pw.length<8){errEl.textContent='Password must be at least 8 characters.';errEl.style.display='block';return;}
      if(pw!==pw2){errEl.textContent='Passwords do not match.';errEl.style.display='block';return;}
      btn.disabled=true;btn.textContent='Saving…';errEl.style.display='none';
      const{error:pwError}=await db.auth.updateUser({password:pw});
      if(pwError){errEl.textContent=pwError.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Set Password & Continue →';return;}
      const{data:{session}}=await db.auth.getSession();
      if(session){await db.from('users').update({must_change_password:false,temp_password:null}).eq('email',session.user.email);const{data:u}=await db.from('users').select('role').eq('email',session.user.email).single();window.location.href=u?.role==='teacher'?BASE+'/school.html':BASE+'/parent.html';}
    }
    document.addEventListener('keydown',e=>{if(e.key==='Enter')savePassword();});
    init();
  </script>
</body>
</html>
